    }
    .center span {
      width: 40px;
      height: 40px;
      font-size: 20px;

      margin-top: 10px;
      text-align: center;
      color: aliceblue;
      border-radius: 50%;
      background-color: rgb(72, 0, 255);
    }

    .center {
      margin: 0px 50px;
      transform: scale(3);
      position: relative;
      top: 200px;
    }

    .choose {
      border: 1px solid rgba(85, 255, 0, 0.425);

      width: 100px;
      line-height: 30px;
      margin: 30px;
      background: rgba(0, 255, 162, 0.423);
    }

    .left input[type="radio"]:checked {
      border: 5px solid rgb(255, 0, 0);
    }

      -webkit-appearance: none;
      width: 13px;
      height: 13px;
      border: 1px solid rgb(255, 0, 0);
      vertical-align: middLe;
      border-radius: 50px;

        var n = new Date().getFullYear(),

          h = new Date().getHours(),
          f = new Date().getMinutes(),
          s = new Date().getSeconds(),
          wu = "";

          wu = "凌晨";

          wu = "上午";
        } else if (h > 12 && h <= 18) {
          wu = "下午";
        } else if (h > 18 && h <= 24) {
          wu = "晚上";
        }
        inp.value = `${n}年-${y + 1}月-${r}日-${wu}-${h}点-${f}分钟-${s}秒`;
      }, 1000);
      ting.onclick = function () {
        clearInterval(b);
      };
